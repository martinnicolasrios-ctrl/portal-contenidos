<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portal de Contenidos</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #ffffff;
    }

    /* ── NAV ── */
    header {
      height: 60px;
      background: #ffffff;
      border-bottom: 2px solid #e5e7eb;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      display: flex;
      align-items: center;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
    }

    nav {
      display: flex;
      flex-wrap: nowrap;
      gap: 4px;
      padding: 0 16px;
      width: 100%;
      overflow-x: auto;
      scrollbar-width: none;
    }

    nav::-webkit-scrollbar { display: none; }

    nav button {
      flex-shrink: 0;
      padding: 8px 18px;
      border: 2px solid #d1d5db;
      background: #f9fafb;
      color: #374151;
      font-size: 0.875rem;
      font-weight: 600;
      font-family: inherit;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s ease;
      white-space: nowrap;
    }

    nav button:hover {
      border-color: #2563eb;
      color: #2563eb;
      background: #eff6ff;
    }

    nav button.active {
      background: #2563eb;
      border-color: #2563eb;
      color: #ffffff;
      box-shadow: 0 2px 8px rgba(37,99,235,0.30);
    }

    /* ── IFRAME ── */
    #portal-frame {
      display: block;
      position: fixed;
      top: 60px;
      left: 0;
      width: 100%;
      height: calc(100vh - 60px);
      border: none;
      background: #f9fafb;
    }
  </style>
</head>
<body>

<header>
  <nav>
    <button class="active" onclick="loadPage('noticias.html', this)">Noticias del día</button>
    <button onclick="loadPage('boletin.html', this)">Boletín Oficial</button>
    <button onclick="loadPage('cierre-datos.html', this)">Cierre datos duros</button>
    <button onclick="loadPage('cierre-noticias.html', this)">Cierre + noticias</button>
    <button onclick="loadPage('vista-jornada.html', this)">Vista jornada</button>
  </nav>
</header>

<iframe id="portal-frame" src="noticias.html" title="Contenido"></iframe>

<script>
  function loadPage(src, btn) {
    document.getElementById('portal-frame').src = src;
    document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  }
</script>

</body>
</html>
